# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

name = "space_game"
version = "0.2.0"

gleam = ">=1.17.0"
target = "erlang"

description = "A slow space trading game over Discord"
licences = ["MIT"]
repository = { type = "github", user = "arconyx", repo = "space-game" }

# Excluded from documentation
# internal_modules = [
#   "discord/api",
#   "discord/gatehouse",
#   "discord/gateway",
#   "discord/watcher"
# ]

[dependencies]
gleam_stdlib = ">= 1.0.3 and < 2.0.0"
sqlight = ">= 1.0.2 and < 2.0.0"
cake = ">= 4.1.0 and < 5.0.0"
cake_sqlight = ">= 1.1.2 and < 2.0.0"
logging = ">= 1.3.0 and < 2.0.0"
stratus = ">= 3.0.0 and < 4.0.0"
gleam_hackney = ">= 1.3.1 and < 2.0.0"
gleam_http = ">= 4.1.1 and < 5.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_otp = ">= 1.1.0 and < 2.0.0"
gleam_json = ">= 3.0.2 and < 4.0.0"
gleam_time = ">= 1.4.0 and < 2.0.0"
envoy = ">= 1.2.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.11.0 and < 2.0.0"
